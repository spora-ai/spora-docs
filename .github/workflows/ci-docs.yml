name: CI

# External actions are pinned to full commit SHAs to prevent supply-chain
# attacks via tag reassignment. Run `gh api repos/OWNER/REPO/git/ref/tags/vN`
# to look up the current SHA when upgrading. Review SonarCloud hotspots
# (rule githubactions:S7637) periodically.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-md:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Markdown lint
        run: npm run lint:md

  prettier:
    name: Prettier check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Prettier check
        run: npm run format:check

  api-spec:
    name: Generate OpenAPI spec from spora-core
    runs-on: ubuntu-latest
    steps:
      # spora-core is a sibling repo under the spora-ai GitHub org. Check it out
      # into ./spora-core so the rest of the job can run its PHP tooling against
      # the latest main.
      # Checkout spora-docs itself so $GITHUB_WORKSPACE resolves to this repo
      # and docs/.vuepress/ exists on disk for the write target. Without this
      # the inner spora-core checkout leaves the spora-docs workspace empty
      # and the spec generator's file_put_contents fails.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout spora-core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: spora-ai/spora-core
          ref: main
          path: spora-core

      # Both repos are public within the spora-ai org, so the default
      # GITHUB_TOKEN has read access. If spora-core ever moves behind a private
      # visibility, swap in `token: ${{ secrets.CROSS_REPO_READ_TOKEN }}`
      # below — a PAT with `contents:read` on spora-ai/spora-core.
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, zip
          coverage: none

      - name: Composer install (spora-core)
        working-directory: spora-core
        run: composer install --no-interaction --prefer-dist

      # Bypasses bin/spora (and therefore the Kernel/DI/secret-key boot) so a
      # clean checkout with no storage/secret.key can still emit the spec.
      # `bin/spora-build` is spora-core's build-time companion to `bin/spora`
      # — a Symfony Console subcommand entry that skips the kernel boot.
      #
      # It only exists on spora-core's `main` branch AFTER spora-core PR #140
      # merges. Until then this step fails by design — the docs PR's CI
      # turns green the moment spora-core PR #140 lands on main and this
      # run is retriggered.
      - name: Generate openapi.json
        working-directory: spora-core
        run: |
          if [ ! -f bin/spora-build ]; then
            echo "::error::bin/spora-build not found on spora-core@${{ github.sha }}-external."
            echo "::error::This workflow requires spora-core PR #140 (the spora-build openapi:generate entry) to be merged into main first."
            echo "::error::After spora-core PR #140 merges, retrigger this PR's CI (the 'api-spec' job will then succeed)."
            exit 1
          fi
          php bin/spora-build openapi:generate "$GITHUB_WORKSPACE/docs/.vuepress/openapi.json"

      - name: Upload spec artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: openapi-spec
          path: docs/.vuepress/openapi.json
          if-no-files-found: error
          retention-days: 7

  api-md-drift:
    name: API reference drift check
    needs: api-spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Download generated spec
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: openapi-spec
          # Extract the artifact into the parent directory; actions/download-artifact
          # treats `path:` as a directory, so the file lands at openapi.json
          # inside it. Pointing `path:` at the file itself causes EISDIR
          # downstream when gen-api.mjs reads the spec.
          path: docs/.vuepress/

      # Fails the build when docs/reference/api.md is out of date with the
      # just-regenerated spec. Same semantics as the previous locally-vendored
      # copy.
      - name: gen:api:check
        run: npm run gen:api:check

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build site
    needs: api-spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Download generated spec
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: openapi-spec
          # Extract the artifact into the parent directory; actions/download-artifact
          # treats `path:` as a directory, so the file lands at openapi.json
          # inside it. Pointing `path:` at the file itself causes EISDIR
          # downstream when gen-api.mjs reads the spec.
          path: docs/.vuepress/

      # Render the page from the freshly-generated spec before VuePress builds,
      # so the published api.md reflects the current spora-core route surface.
      - name: gen:api
        run: npm run gen:api

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: docs-build
          path: docs/.vuepress/dist
          if-no-files-found: error
          retention-days: 7
